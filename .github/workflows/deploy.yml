name: Deploy to Render

on:
  push:
    branches:
      - main

concurrency:
  group: render-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run auth verification tests
        run: |
          cargo test auth
          cargo test routes_auth

      - name: Run persistence contract tests
        env:
          SQLX_OFFLINE: "true"
        run: |
          cargo test persistence
          if [ -n "$DATABASE_URL" ]; then
            sqlx migrate run
            cargo test persistence_integration
          else
            echo "DATABASE_URL not set — skipping DB integration tests"
          fi

      - name: Build release binary
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release

      - name: Trigger deploy via webhook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Missing required secret: RENDER_DEPLOY_HOOK"
            exit 1
          fi

          echo "Triggering Render deployment..."
          curl -X POST "$RENDER_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"$(git rev-parse HEAD)\"}"

          echo "Deploy hook triggered successfully"