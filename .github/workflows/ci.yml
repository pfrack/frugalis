name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Lint
        env:
          SQLX_OFFLINE: "true"
        run: cargo clippy --all-targets -- -D warnings

      - name: Type check
        env:
          SQLX_OFFLINE: "true"
        run: cargo check

      - name: Run auth verification tests
        run: |
          cargo test auth
          cargo test routes_auth

      - name: Run persistence contract tests
        env:
          SQLX_OFFLINE: "true"
        run: |
          if [ -n "$DATABASE_URL" ]; then
            cargo test persistence::tests
            sqlx migrate run
            cargo test persistence_integration
          else
            cargo test persistence::tests -- --skip test_pg_log_concurrency_limit_parsed_from_env --skip test_db_connection_retry_panics_after_failures
            echo "DATABASE_URL not set — skipping PG integration tests"
          fi

      - name: Build release binary
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release
