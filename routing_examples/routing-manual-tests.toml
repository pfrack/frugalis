# Routing overlay matching manual-test/run.sh expectations (NVIDIA NIM).
# Usage: CONFIG_PATH=this-file.toml frugalis
# Requires NVIDIA_API_KEY env var to be set.
#
# Cerebrum's merge semantics for [routing] are per-key additive — unmentioned
# routes inherit from the built-in defaults.

[routing.FILE_READING]
model = "meta/llama-3.1-70b-instruct"
endpoint = "https://integrate.api.nvidia.com/v1/chat/completions"
provider_type = "nvidia_nim"
api_key_env = "NVIDIA_API_KEY"

[routing.COMPLEX_REASONING]
model = "meta/llama-3.3-70b-instruct"
endpoint = "https://integrate.api.nvidia.com/v1/chat/completions"
provider_type = "nvidia_nim"
api_key_env = "NVIDIA_API_KEY"

[routing.SYNTAX_FIX]
model = "qwen/qwen3-coder-480b-a35b-instruct"
endpoint = "https://integrate.api.nvidia.com/v1/chat/completions"
provider_type = "nvidia_nim"
api_key_env = "NVIDIA_API_KEY"

[routing.CASUAL]
model = "meta/llama-3.1-8b-instruct"
endpoint = "https://integrate.api.nvidia.com/v1/chat/completions"
provider_type = "nvidia_nim"
api_key_env = "NVIDIA_API_KEY"

[routing.DEFAULT]
model = "nvidia/nemotron-3-nano-30b-a3b"
endpoint = "https://integrate.api.nvidia.com/v1/chat/completions"
provider_type = "nvidia_nim"
api_key_env = "NVIDIA_API_KEY"
