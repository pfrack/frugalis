# Routing overlay using OpenRouter.
# Usage: CONFIG_PATH=this-file.toml frugalis
# Requires OPENROUTER_API_KEY env var to be set.
#
# Cerebrum's merge semantics for [routing] are per-key additive — unmentioned
# routes inherit from the built-in defaults.

[routing.FILE_READING]
model = "deepseek/deepseek-chat"
endpoint = "https://openrouter.ai/api/v1/chat/completions"
provider_type = "openai_compatible"
api_key_env = "OPENROUTER_API_KEY"

[routing.COMPLEX_REASONING]
model = "anthropic/claude-3.5-sonnet"
endpoint = "https://openrouter.ai/api/v1/chat/completions"
provider_type = "openai_compatible"
api_key_env = "OPENROUTER_API_KEY"

[routing.SYNTAX_FIX]
model = "openai/gpt-4o-mini"
endpoint = "https://openrouter.ai/api/v1/chat/completions"
provider_type = "openai_compatible"
api_key_env = "OPENROUTER_API_KEY"

[routing.CASUAL]
model = "meta-llama/llama-3.1-8b-instruct"
endpoint = "https://openrouter.ai/api/v1/chat/completions"
provider_type = "openai_compatible"
api_key_env = "OPENROUTER_API_KEY"

[routing.DEFAULT]
model = "openai/gpt-4o-mini"
endpoint = "https://openrouter.ai/api/v1/chat/completions"
provider_type = "openai_compatible"
api_key_env = "OPENROUTER_API_KEY"
