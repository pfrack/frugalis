openapi: "3.0.3"
info:
  title: Cerebrum Proxy API
  description: Intent-aware request routing for autonomous agent workflows. Provides classify and chat completion endpoints.
  version: "0.1.0"
paths:
  /v1/classify:
    post:
      summary: Classify intent from a user message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                      content:
                        type: string
                    required: [role, content]
              required: [messages]
      responses:
        "200":
          description: Intent classified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [classified]
                  category:
                    type: string
                    enum: [COMPLEX_REASONING, FILE_READING, SYNTAX_FIX, CASUAL]
                  model:
                    type: string
                    description: Model selected for this category
                  tier:
                    type: string
                    enum: [Regex, FewShot, Fallback]
                required: [status, category, model, tier]
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "415":
          description: Unsupported media type
          content:
            application/json:
              schema:
                type: string
  /v1/chat/completions:
    post:
      summary: Classify intent and route to upstream model
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                      content:
                        type: string
                    required: [role, content]
                stream:
                  type: boolean
                  default: false
                  description: When true, the response is streamed as SSE (Server-Sent Events)
              required: [messages]
      responses:
        "200":
          description: Upstream model completion response
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Upstream model response (pass-through)
                  - type: object
                    properties:
                      status:
                        type: string
                        enum: [classified]
                      category:
                        type: string
                        enum: [COMPLEX_REASONING, FILE_READING, SYNTAX_FIX, CASUAL]
                      model:
                        type: string
                        description: Model selected for this category
                      tier:
                        type: string
                        enum: [Regex, FewShot, Fallback]
                    required: [status, category, model, tier]
                    description: Classification-only response when no upstream is configured
            text/event-stream:
              schema:
                type: string
                description: >
                  Raw SSE byte stream. Upstream bytes are forwarded directly as
                  server-sent events. A `: keepalive` comment is injected every
                  15 seconds of silence. Non-2xx upstream responses emit an
                  `event: error` SSE event before closing.
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [bad_request]
                  status:
                    type: integer
                    example: 400
                  message:
                    type: string
                required: [error, status, message]
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "415":
          description: Unsupported media type
          content:
            application/json:
              schema:
                type: string
        "502":
          description: |
            Upstream API unreachable or no endpoint configured.
            Upstream 4xx and 5xx responses (400, 401, 403, 429, 500, 503,
            etc.) are wrapped in the same envelope with the upstream's
            status code preserved in the `status` field.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [upstream_error]
                  status:
                    type: integer
                    example: 502
                  message:
                    type: string
                required: [error, status, message]
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "PROXY_API_BEARER_TOKEN"
