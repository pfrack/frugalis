openapi: "3.0.3"
info:
  title: Cerebrum Proxy API
  description: Intent-aware request routing for autonomous agent workflows. Provides classify and chat completion endpoints.
  version: "0.1.0"
paths:
  /v1/classify:
    post:
      summary: Classify intent from a user message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                      content:
                        type: string
                    required: [role, content]
              required: [messages]
      responses:
        "200":
          description: Intent classified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [classified]
                  category:
                    type: string
                    enum: [COMPLEX_REASONING, FILE_READING, SYNTAX_FIX, CASUAL]
                  model:
                    type: string
                    description: Model selected for this category
                  tier:
                    type: string
                    enum: [Regex, Fallback]
                required: [status, category, model, tier]
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "415":
          description: Unsupported media type
          content:
            application/json:
              schema:
                type: string
  /v1/chat/completions:
    post:
      summary: Classify intent and route to upstream model
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                      content:
                        type: string
                    required: [role, content]
              required: [messages]
      responses:
        "200":
          description: Upstream model completion response
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Upstream model response (pass-through)
                  - type: object
                    properties:
                      status:
                        type: string
                        enum: [classified]
                      category:
                        type: string
                        enum: [COMPLEX_REASONING, FILE_READING, SYNTAX_FIX, CASUAL]
                      model:
                        type: string
                        description: Model selected for this category
                      tier:
                        type: string
                        enum: [Regex, Fallback]
                    required: [status, category, model, tier]
                    description: Classification-only response when no upstream is configured
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [bad_request]
                  status:
                    type: integer
                    example: 400
                  message:
                    type: string
                required: [error, status, message]
                description: >
                  The raw JSON response from the upstream model API (typically
                  OpenAI-compatible chat completion format). The response body
                  is passed through from the upstream provider without
                  transformation. When no upstream is configured, the response
                  is a synthetic classification JSON with `status`, `category`,
                  `model`, and `tier` fields.
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "415":
          description: Unsupported media type
          content:
            application/json:
              schema:
                type: string
        "502":
          description: Upstream API unreachable or no endpoint configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [upstream_error]
                  status:
                    type: integer
                    example: 502
                  message:
                    type: string
                required: [error, status, message]
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "PROXY_API_BEARER_TOKEN"

