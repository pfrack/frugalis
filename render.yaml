services:
  - type: web
    name: frugalis
    runtime: rust
    buildCommand: cargo build --release
    startCommand: ./target/release/frugalis
    healthCheckPath: /health
    envVars:
      - key: RUST_LOG
        value: info
      - key: PROXY_API_BEARER_TOKEN
        sync: false
      - key: DASHBOARD_BASIC_USER
        sync: false
      - key: DASHBOARD_BASIC_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false