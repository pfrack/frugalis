# Cerebrum Configuration
# This is the single source of truth for all non-secret configuration.
# Secrets (API keys, database URLs, auth tokens) remain exclusively in environment variables.
# 
# To override settings: set CONFIG_PATH=/path/to/custom.toml
# Your custom file merges on top of these embedded defaults—specify only what you want to change.

[server]
port = 10000
log_level = "info"
log_format = "compact"

[http]
max_upstream_body_bytes = 10485760
keepalive_interval_secs = 15
request_body_limit_bytes = 10485760
client_timeout_secs = 120
client_connect_timeout_secs = 30
streaming_channel_capacity = 32

[cors]
allowed_origins = []

[database]
connection_retries = 3
retry_base_ms = 1000
max_connections = 10
acquire_timeout_secs = 30
idle_timeout_secs = 1800
log_concurrency_limit = 100

[persistence]
backend = "memory"
# sqlite_path = "./cerebrum.db"

[classifiers]
enabled = true
order = ["regex", "fewshot", "llm"]

[regex_classifier]
enabled = true
short_prompt_len = 30

# [fewshot_classifier] — uncomment to enable few-shot backend
# enabled = true
# confidence_threshold = 0.4
# cold_start_threshold = 0.6
# cold_start_feedback_count = 5
# feature_dimensions = 1000
# retraining_threshold = 5
# data_path = "data/fewshot_training.yaml"
# max_vocabulary_warn = 5000
# max_training_examples = 10000

# [llm_classifier] — uncomment to enable LLM backend
# enabled = true
# model = "gpt-4o-mini"
# endpoint = "https://api.openai.com/v1/chat/completions"
# api_key_env = "OPENAI_API_KEY"
# provider_type = "openai_compatible"
# prompt_template_path = "path/to/prompt.txt"
# timeout_secs = 3

[categories.FILE_READING]
description = "Reading, viewing, inspecting, searching, or navigating files or code"
threshold = 3
priority = 1
patterns = [
  { regex = '(?i)\b(?:read|show|display|print|cat|view|open)\s+(?:the\s+)?(?:file|contents|this\s+file|that\s+file)\b', weight = 3 },
  { regex = '(?i)\b(?:show|display|print|cat)\s+(?:me\s+)?(?:the\s+)?(?:content|output)(?:\s+of)?', weight = 3 },
  { regex = '(?i)\b(?:[a-zA-Z0-9_\-./\\]+\.(?:rs|py|js|ts|go|java|c|cpp|h|to?ml|ya?ml|json|md|sql|sh|html))', weight = 3 },
  { regex = '(?i)\b(?:line|lines)\s+\d+', weight = 3 },
  { regex = '''(?i)\b(?:what(?:\s+is|'s)\s+(?:in|inside))\s+(?:the\s+)?(?:file|directory|folder) ''', weight = 2 },
  { regex = '(?i)\b(?:look|go|navigate)\s+(?:at|through|to|into)\s+(?:the\s+)?(?:file|directory|code|source)', weight = 2 },
  { regex = '(?i)\b(?:list|ls|dir|tree)\s+(?:files|directories|contents|all|the)', weight = 2 },
  { regex = '(?i)\b(?:find|search|grep|locate|where\s+is)\s+(?:in|through|within|the)\s+(?:the\s+)?(?:file|code|project|source)', weight = 2 },
  { regex = '(?i)\b(?:where\s+is|locate\s+the|find\s+the)\s+(?:file|definition|function|class|module|struct|trait|impl)', weight = 2 },
  { regex = '(?i)\b(?:what\s+does\s+this\s+file|show\s+me\s+the\s+code|view\s+the\s+source|check\s+the\s+file)', weight = 1 },
  { regex = '(?i)\b(?:see|check|inspect|examine)\s+(?:the\s+)?(?:file|code|content|output|log)', weight = 1 },
  { regex = '(?i)\b(?:around\s+line|near\s+line|before\s+line|after\s+line)', weight = 1 },
]

[categories.SYNTAX_FIX]
description = "Fixing bugs, errors, typos, compilation issues, or broken code"
threshold = 3
priority = 2
dual_threshold = { alt_score = 4, suppress_if_present = "FILE_READING" }
patterns = [
  { regex = '(?i)\b(?:fix|correct|repair|patch)\s+(?:this|the|my|a)\s+(?:bug|error|issue|typo|problem|mistake|warning)', weight = 3 },
  { regex = '''(?i)\b(?:doesn't\s+compile|won't\s+compile|doesn't\s+build|won't\s+build|compilation\s+error|syntax\s+error|build\s+error) ''', weight = 3 },
  { regex = '(?i)\b(?:type\s+error|linter?\s+(?:error|warning)|runtime\s+error|segfault|null\s+pointer|borrow\s+check)', weight = 3 },
  { regex = '''(?i)\b(?:why\s+doesn't\s+this\s+work|what(?:\s+is|'s)\s+wrong\s+with|this\s+(?:is|seems)\s+broken) ''', weight = 2 },
  { regex = '(?i)\b(?:stack\s+trace|backtrace|panic|exception|traceback|\.unwrap)', weight = 2 },
  { regex = '(?i)\b(?:missing\s+(?:semicolon|import|parenthesis|brace|bracket|quote|comma|colon|use\s+statement|dependency|argument|parameter))', weight = 2 },
  { regex = '(?i)\b(?:undefined\s+(?:variable|function|symbol|reference|type|method)|not\s+found\s+in\s+this\s+scope|unresolved\s+reference)', weight = 2 },
  { regex = '(?i)\b(?:typo|misspell(?:ed|ing)?|copy.?paste\s+error|fat\s+finger)', weight = 2 },
  { regex = '''(?i)\b(?:doesn't\s+work|is\s+broken|stopped\s+working|broke|isn't\s+working|not\s+working) ''', weight = 1 },
  { regex = '''(?i)\b(?:here(?:'s|\s+is)\s+(?:the|an|my)\s+error|getting\s+(?:this|an)\s+error|seeing\s+(?:this|an)\s+error) ''', weight = 1 },
  { regex = '(?i)\b(?:error[:;].{0,40}\b(?:\d+|E\d{4}|0x[0-9a-fA-F]+)\b)', weight = 1 },
]

[categories.COMPLEX_REASONING]
description = "Multi-step reasoning, architecture design, refactoring, deep analysis, or performance optimization"
threshold = 3
priority = 3
patterns = [
  { regex = '(?i)\b(?:architect|design\s+pattern|system\s+design|trade.?off|refactor|restructure|rearchitect)', weight = 3 },
  { regex = '(?i)\b(?:how\s+would\s+you\s+(?:design|architect|structure|build|implement|approach|solve))', weight = 3 },
  { regex = '(?i)\b(?:multi.?step|concurr|distributed|pipeline|scal(?:e|ing|able)|optimiz|bottleneck)', weight = 3 },
  { regex = '(?i)\b(?:redesign\s+the|rewrite\s+(?:the\s+)?(?:entire|whole)|audit\s+the\s+codebase|rearchitect)', weight = 3 },
  { regex = '(?i)\b(?:deep\s+dive|analy(?:ze|sis)|evaluat|compare\s+and\s+contrast|trade.?off|pros?\s+and\s+cons?\b)', weight = 2 },
  { regex = '(?i)\b(?:best\s+(?:practice|approach|way|pattern)|design\s+(?:a|the)\s+(?:system|architecture|api|database|schema|service))', weight = 2 },
  { regex = '''(?i)\b(?:reason\s+about|explain\s+why|what(?:\s+is|'s)\s+the\s+(?:best|optimal|right|correct)\s+way) ''', weight = 2 },
  { regex = '(?i)\b(?:multi.?thread|async|event.?driven|microservice|rate\s+limit|load\s+balanc)', weight = 2 },
  { regex = '(?i)\b(?:integrat(?:e|ion)\s+(?:with|into|between)|migrat(?:e|ion)\s+(?:from|to|strategy)|orchestrat)', weight = 2 },
  { regex = '(?i)\b(?:performance\s+(?:bottleneck|issue|problem|analysis|tuning|profiling|regression)|memory\s+leak|race\s+condition|deadlock)', weight = 2 },
  { regex = '(?i)\b(?:can\s+you\s+(?:help\s+me\s+)?(?:design|plan|architect|think\s+(?:through|about)|reason\s+about))', weight = 1 },
  { regex = '(?i)\b(?:strategy|blueprint|roadmap|plan\s+(?:out|for)|approach\s+to)', weight = 1 },
  { regex = '(?i)\b(?:security\s+(?:audit|review|analysis)|threat\s+model)', weight = 1 },
  { regex = '(?i)\b(?:state\s+machine|algorithm\s+(?:design|complexity|analysis))', weight = 1 },
  { regex = '(?i)\b(?:dependenc(?:y|ies)\s+(?:graph|tree|injection|management)|coupling|cohesion)', weight = 1 },
  { regex = '(?i)\b(?:resilien(?:t|ce)|fault\s+toleran|circuit\s+breaker|retry\s+strategy)', weight = 1 },
]

[categories.CASUAL]
description = "Simple questions, greetings, general conversation, or short prompts"
threshold = 1
priority = 4
patterns = [
  { regex = '(?i)^\s*(?:hi|hey|hello|greetings|good\s+morning|good\s+afternoon|good\s+evening|howdy)(?:\s+there)?[\s!.,]*$', weight = 3 },
  { regex = '(?i)^\s*(?:thanks|thank\s+you|thx|ty|appreciate\s+it|cheers|thanks\s+a\s+lot)[\s!.,]*$', weight = 2 },
  { regex = '''(?i)^\s*(?:what\s+is|what\s+are|what's|what\s+does|define|definition\s+of)\s+\w+(?:\s+\w+){0,2}\s*\??$ ''', weight = 1 },
  { regex = '(?i)^\s*(?:how\s+(?:do|can|should)\s+I\s+\w+)(?:\s+\w+){0,4}\s*\??$', weight = 1 },
  { regex = '(?i)^\s*(?:ok|okay|got\s+it|understood|alright|cool|nice|good|great|sure|yes|no|maybe|idk)[\s!.,]*$', weight = 1 },
]

[[negative_patterns]]
regex = '(?i)\b(?:read|show|display|cat|view|open)\s+(?:the|this|my|a)\s+\w*(?:architecture|design|system|pattern|refactor)'
suppressed = "COMPLEX_REASONING"
penalty = 2

[[negative_patterns]]
regex = '(?i)\b(?:fix|correct|repair)\s+(?:the|this|my)\s+(?:compile|syntax|typo|lint|warning|error)'
suppressed = "COMPLEX_REASONING"
penalty = 2

[[negative_patterns]]
regex = '(?i)\b(?:design|architect|refactor|rearchitect|restructure)\s+(?:a|the|an)\s+(?:fix|solution|remedy|patch|workaround)'
suppressed = "SYNTAX_FIX"
penalty = 2

[[negative_patterns]]
regex = '(?i)\b(?:explain|describe|tell\s+me\s+about|what\s+do\s+you\s+think\s+about)\s+(?:the|this|that)\s+(?:file|code|class|module)'
suppressed = "FILE_READING"
penalty = 2

[routing.FILE_READING]
model = "meta/llama-3.1-70b-instruct"
endpoint = "https://integrate.api.nvidia.com/v1/chat/completions"
provider_type = "nvidia_nim"
api_key_env = "NVIDIA_API_KEY"

[routing.SYNTAX_FIX]
model = "meta/llama-3.1-8b-instruct"
endpoint = "https://integrate.api.nvidia.com/v1/chat/completions"
provider_type = "nvidia_nim"
api_key_env = "NVIDIA_API_KEY"

[routing.COMPLEX_REASONING]
model = "meta/llama-3.3-70b-instruct"
endpoint = "https://integrate.api.nvidia.com/v1/chat/completions"
provider_type = "nvidia_nim"
api_key_env = "NVIDIA_API_KEY"

[routing.CASUAL]
model = "meta/llama-3.1-8b-instruct"
endpoint = "https://integrate.api.nvidia.com/v1/chat/completions"
provider_type = "nvidia_nim"
api_key_env = "NVIDIA_API_KEY"

[routing.DEFAULT]
model = "meta/llama-3.1-8b-instruct"
endpoint = "https://integrate.api.nvidia.com/v1/chat/completions"
provider_type = "nvidia_nim"
api_key_env = "NVIDIA_API_KEY"

baseline_model = "meta/llama-3.3-70b-instruct"

classify_db_log = false

[model_costs]
"claude-3.5-sonnet" = 3.00
"gpt-4o" = 2.50
"gpt-4o-mini" = 0.15
"deepseek-chat" = 0.14

[dashboard]
default_hours = 24
hours_min = 1
hours_max = 720
page_limit = 20
page_limit_max = 100
recent_count = 5

[[auth_provider]]
type = "openai_compatible"
header = "authorization"
value_template = "Bearer {api_key}"

[[auth_provider]]
type = "anthropic"
header = "x-api-key"
value_template = "{api_key}"

[[auth_provider]]
type = "ollama"

[[auth_provider]]
type = "local"

[[auth_provider]]
type = "nvidia_nim"
header = "authorization"
value_template = "Bearer {api_key}"
