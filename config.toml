# Uncomment to enable LLM classifier backend (Phase 2 of S-09)
# [llm_classifier]
# enabled = true
# model = "gpt-4o-mini"
# endpoint = "https://api.openai.com/v1/chat/completions"
# api_key_env = "OPENAI_API_KEY"  # env var name holding the API key
# provider_type = "openai_compatible"  # openai_compatible, anthropic, ollama, local
# prompt_template_path = "path/to/prompt.txt"  # optional custom prompt
# timeout_secs = 3

[[categories]]
name = "FILE_READING"
description = "Reading files"
threshold = 3
priority = 1
model_env_var = "DEFAULT_MODEL_READING"

[[categories]]
name = "CASUAL"
description = "Simple questions"
threshold = 1
priority = 4
model_env_var = "DEFAULT_MODEL"
