<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerebrum Dashboard</title>
    <link rel="stylesheet" href="/static/dashboard.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='none' stroke='%234a6cf7' stroke-width='2.5'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%234a6cf7'/%3E%3Cpath d='M16 2v6M16 24v6M2 16h6M24 16h6' stroke='%234a6cf7' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
    <script>
      (function(){
        var theme = localStorage.getItem("theme");
        if (!theme) { theme = matchMedia("(prefers-color-scheme:dark)").matches ? "dark" : "light"; }
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="14" stroke="#4a6cf7" stroke-width="2.5"/>
      <circle cx="16" cy="16" r="5" fill="#4a6cf7"/>
      <path d="M16 2v6M16 24v6M2 16h6M24 16h6" stroke="#4a6cf7" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Cerebrum
  </div>
    <nav class="sidebar-nav">
    {% for item in nav.pages %}
    <a href="/dashboard{% if item.path != "" %}/{{ item.path }}{% endif %}" class="{% if item.active %}active{% endif %}">
      {{ item.icon|safe }}
      {{ item.label }}
    </a>
    {% endfor %}
  </nav>
  <div class="sidebar-divider"></div>
  <div class="sidebar-footer">
    <span>Intent-aware routing</span>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
      <svg class="sun-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="moon-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</aside>
<main class="main-content">
{% block content %}{% endblock %}
</main>
<script>
function toggleTheme() {
  var html = document.documentElement;
  var cur = html.getAttribute("data-theme");
  var next = cur === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
}
</script>
</body>
</html>
