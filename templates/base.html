<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerebrum Dashboard</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            font-size: 14px;
            line-height: 1.5;
        }
        header {
            background: #1d1d1f;
            color: #fff;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        header a { color: #a1a1a6; text-decoration: none; font-size: 13px; }
        header a:hover { color: #fff; }
        header h1 { font-size: 15px; font-weight: 600; flex: 1; }
        main { max-width: 1200px; margin: 1.5rem auto; padding: 0 1.5rem; }
        .card {
            background: #fff;
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
            margin-bottom: 1rem;
        }
        .error-banner {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #a8071a;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 13px;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: #6e6e73;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid #e5e5ea;
        }
        td {
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid #f2f2f7;
            vertical-align: top;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9f9fb; }
        details summary {
            cursor: pointer;
            color: #1d1d1f;
            max-width: 420px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        details[open] summary { white-space: normal; }
        details pre {
            margin-top: 0.4rem;
            font-family: "SF Mono", Menlo, Consolas, monospace;
            font-size: 12px;
            background: #f5f5f7;
            padding: 0.5rem;
            border-radius: 6px;
            white-space: pre-wrap;
            max-width: 500px;
            color: #3a3a3c;
        }
        .badge {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            background: #f2f2f7;
            color: #3a3a3c;
        }
        .muted { color: #8e8e93; }
        form.filters { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; }
        form.filters label { display: flex; flex-direction: column; gap: 3px; font-size: 12px; color: #6e6e73; font-weight: 500; }
        form.filters input {
            padding: 0.4rem 0.6rem;
            border: 1px solid #d1d1d6;
            border-radius: 6px;
            font-size: 13px;
            width: 180px;
            outline: none;
        }
        form.filters input:focus { border-color: #0071e3; }
        .btn {
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            border: none;
        }
        .btn-primary { background: #0071e3; color: #fff; }
        .btn-primary:hover { background: #0077ed; }
        .btn-ghost { background: #f2f2f7; color: #1d1d1f; }
        .btn-ghost:hover { background: #e5e5ea; }
        .pagination { display: flex; align-items: center; gap: 0.75rem; margin-top: 1rem; font-size: 13px; color: #6e6e73; }
        .empty-state { text-align: center; padding: 3rem 1rem; color: #6e6e73; }
        .empty-state p { font-size: 15px; margin-bottom: 0.5rem; }
        .empty-state small { font-size: 12px; }
    </style>
</head>
<body>
<header>
    <h1>Cerebrum</h1>
    {% block nav %}{% endblock %}
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
